<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ScoutCal</title>
    <link rel="stylesheet" href="style.css" />

    <!-- Link icon font-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
  </head>
  <body>
    <header>
      <div class="logo">ScoutCal</div>
      <button id="theme-toggle">Toggle Mode</button>
    </header>

    <main>
      <div class="space">
        <div class="hero">
          <h1>Locations</h1>

          <div class="add-address-box">
            <input type="text" id="address-box" placeholder="Paste address here" class = "address-input"/>
            <button id="address-add-btn" class = "address-add-btn"><i class="fa-solid fa-plus"></i></button>
            
          </div>
          
          <ul class="address-list">
            <li class="address-box">
              <div class="address-subbox">
              <h3 class="address-title">Tony Rys</h3>
              <p class="address-detail">121 Avenue 25, Los Angeles 90001</p>
              </div>
              <div class="order-container">
                <button class="order-up-btn"><i class="fa-solid fa-angle-up"></i></button>
                <button class="order-down-btn"><i class="fa-solid fa-angle-down"></i></button>
              </div>
            </li>
            <li class="address-box">
              <div class="address-subbox">
              <h3 class="address-title">Tony Rys</h3>
              <p class="address-detail">121 Avenue 25, Los Angeles 90001</p>
              </div>
              <div class="order-container">
                <button class="order-up-btn"><i class="fa-solid fa-angle-up"></i></button>
                <button class="order-down-btn"><i class="fa-solid fa-angle-down"></i></button>
              </div>
            </li>
            <li class="address-box">
              <div class="address-subbox">
              <h3 class="address-title">Tony Rys</h3>
              <p class="address-detail">121 Avenue 25, Los Angeles 90001</p>
              </div>
              <div class="order-container">
                <button class="order-up-btn"><i class="fa-solid fa-angle-up"></i></button>
                <button class="order-down-btn"><i class="fa-solid fa-angle-down"></i></button>
              </div>
            </li>
          </ul>
        </div>
        <div class="map">
          <div class="map-holder">
            <p class="map">Place map here</p>
          </div>      
        </div>
    </main>

    <footer>
      <p>&copy; 2026 MyWorkspace. Created with ❤️</p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
